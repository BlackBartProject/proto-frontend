<section class="flex w-full">
    <!--Digital watch-->
    <div class="flex h-4rem flex-column flex-grow-1  align-items-center justify-content-center">
        <h2 class="parent-font time">{{currentTime | date: 'HH:mm:ss'}}</h2><!--{{currentTime | date: 'HH:mm:ss'}}-->
    </div>
    <!--Weather-->
    <div class="flex h-4rem flex-grow-1 align-items-center justify-content-center">
        @if (icon && degrees) {
            <img 
                class="flex" 
                [src]="icon"
                [pTooltip]="location" 
                tooltipPosition="bottom"
                alt="Weather icon" 
                width="50px" 
                height="50px">
            <h3 class="flex">{{degrees}}</h3>
        }
    </div>    

</section>
