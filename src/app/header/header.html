<header class="flex">
    <div class="flex  mr-8 flex-none align-items-center justify-content-center">
        <h2 class="font-logo animated-font">
            <a [routerLink]="'/home'" [routerLinkActive]="'active'">PROTOVIRTUAL</a>
        </h2>
    </div>

    <!--navigation buttons-->
    <nav class="flex flex-grow-1  align-items-center justify-content-evenly ">
        <ng-container *ngFor="let route of navigationRoutes">
            <a class="flex nav-links" [routerLink]="route.routerLink" [routerLinkActive]="route.routerLinkActive">{{route.title}}</a>
        </ng-container>
    </nav>

    <!--weather app-->
    <div class="flex flex-grow-1">
       <app-weather class="w-full"></app-weather>
    </div>

</header>
